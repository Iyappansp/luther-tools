<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Create Account — LuthierTools</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="stylesheet" href="assets/css/dark-mode.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #92400E 0%, #1F2937 100%) fixed;
      padding: 40px 20px;
      position: relative;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
    
    body::before {
      content: '';
      position: absolute;
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      filter: blur(40px);
    }
    
    .auth-card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 5;
      animation: cardFadeIn 0.8s cubic-bezier(.4, 0, .2, 1);
    }
    
    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .logo-badge {
      width: 48px;
      height: 48px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .auth-title {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: 4px;
    }

    .auth-subtitle {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 24px;
    }

    /* Steps Display */
    .steps-nav {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
      position: relative;
    }
    .steps-nav::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      z-index: 1;
    }
    .step-item {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 60px;
    }
    .step-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--secondary);
      border: 2px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.5);
      transition: all 0.3s ease;
    }
    .step-dot.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 0 15px rgba(146, 64, 14, 0.4);
    }
    .step-dot.done {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .step-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .step-item.active .step-label { color: var(--primary-light); }

    .auth-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }

    .auth-input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: all .3s ease;
      margin-bottom: 16px;
    }

    .auth-input:focus {
      border-color: var(--primary);
      background: rgba(146, 64, 14, 0.05);
    }

    .tier-opt {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 10px;
    }
    .tier-opt:hover { background: rgba(255, 255, 255, 0.08); }
    .tier-opt.sel {
      border-color: var(--primary);
      background: rgba(146, 64, 14, 0.1);
    }

    .submit-btn {
      width: 100%;
      height: 50px;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .submit-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }

    .divider-text {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 24px;
      margin-bottom: 24px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider-text::before,
    .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }

    .social-btn {
      width: 100%;
      height: 48px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .social-btn svg {
      width: 18px;
      height: 18px;
    }

    .theme-toggle-fixed { position: fixed; top: 24px; right: 24px; z-index: 100; }
    .rtl-toggle-fixed { position: fixed; top: 24px; right: 74px; z-index: 100; }

    /* Light Mode */
    body.light { background: #f3f4f6; }
    body.light .auth-card { background: #fff; border-color: var(--border); box-shadow: 0 12px 32px rgba(0,0,0,0.06); }
    body.light .auth-title { color: var(--secondary); }
    body.light .auth-subtitle, body.light .auth-label { color: var(--text-muted); }
    body.light .auth-input { background: #fff; border-color: var(--border); color: var(--text); }
    body.light .tier-opt { background: var(--gray-100); border-color: var(--border); }
    body.light .tier-opt.sel { background: rgba(146, 64, 14, 0.05); }
    body.light .step-dot { background: var(--gray-200); color: var(--text-muted); }
  </style>
  <link rel="icon" type="image/png" href="assets/images/favicon.png"/>
</head>
<body>

<div class="rtl-toggle-fixed" style="display:flex;align-items:center;gap:8px;background:var(--surface);padding:8px 12px;border-radius:100px;border:1px solid var(--border);box-shadow:var(--shadow-sm);">
      <span style="font-size:0.65rem;font-weight:700;color:var(--text-muted);">RTL</span>
      <label class="tog-sw" title="Toggle RTL">
        <input type="checkbox" data-rtl-toggle>
        <span class="tog-sl"></span>
      </label>
    </div>


<div class="auth-card">
  <a href="index.html" class="logo-container" style="text-decoration: none;"><div class="logo-badge" style="background:var(--secondary); padding:8px;"><img src="assets/images/favicon.png" alt="Logo" style="width:100%;height:100%;object-fit:contain;"></div><div class="logo-text">LuthierTools</div></a>

  <h1 class="auth-title">Create Trade Account</h1>
  <p class="auth-subtitle">Join our community of master builders</p>

  <div class="steps-nav">
    <div class="step-item active" id="si1">
      <div class="step-dot active" id="s1">1</div>
      <span class="step-label">Account</span>
    </div>
    <div class="step-item" id="si2">
      <div class="step-dot" id="s2">2</div>
      <span class="step-label">Business</span>
    </div>
    <div class="step-item" id="si3">
      <div class="step-dot" id="s3">3</div>
      <span class="step-label">Plan</span>
    </div>
  </div>

  <!-- STEP 1 -->
  <div id="step1">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div><label class="auth-label">First Name</label><input class="auth-input" type="text" placeholder="David"/></div>
      <div><label class="auth-label">Last Name</label><input class="auth-input" type="text" placeholder="Arroyo"/></div>
    </div>
    <label class="auth-label">Email Address</label>
    <input class="auth-input" type="email" placeholder="david@workshop.com"/>
    <label class="auth-label">Password</label>
    <input class="auth-input" type="password" placeholder="Min. 8 characters"/>
    
    <button class="submit-btn" onclick="gotoStep(2)">Continue →</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none;">
    <label class="auth-label">Business Name</label>
    <input class="auth-input" type="text" placeholder="Arroyo Guitar Shop"/>
    <label class="auth-label">Country</label>
    <select class="auth-input" style="appearance:none;">
      <option>United States</option>
      <option>United Kingdom</option>
      <option>Germany</option>
      <option>Australia</option>
    </select>
    <label class="auth-label">Workshop Type</label>
    <select class="auth-input">
      <option>Professional Luthier</option>
      <option>Repair Tech</option>
      <option>Hobbyist</option>
    </select>
    
    <div style="display:flex; gap:10px; margin-top:10px;">
      <button class="submit-btn" style="background:var(--secondary);" onclick="gotoStep(1)">← Back</button>
      <button class="submit-btn" onclick="gotoStep(3)">Continue →</button>
    </div>
  </div>

  <!-- STEP 3 -->
  <div id="step3" style="display:none;">
    <div class="tier-opt sel" onclick="pickTier(this)">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div><div style="font-weight:700; color:#fff;">Maker — Free</div><div style="font-size:0.75rem; color:rgba(255,255,255,0.5);">For hobbyists</div></div>
        <span>🔨</span>
      </div>
    </div>
    <div class="tier-opt" onclick="pickTier(this)">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div><div style="font-weight:700; color:#fff;">Trade Pro — $29/mo</div><div style="font-size:0.75rem; color:rgba(255,255,255,0.5);">Wholesale + Tutorials</div></div>
        <span>⭐</span>
      </div>
    </div>
    
    <div style="display:flex; align-items:center; gap:8px; margin:20px 0;">
      <input type="checkbox" id="tos" style="accent-color:var(--primary);"/>
      <label for="tos" style="font-size:0.8rem; color:rgba(255,255,255,0.5);">I agree to the Terms & Privacy</label>
    </div>

    <div style="display:flex; gap:10px;">
      <button class="submit-btn" style="background:var(--secondary);" onclick="gotoStep(2)">← Back</button>
      <button class="submit-btn" onclick="doSignup(this)">Complete 🎸</button>
    </div>
  </div>

  <div class="divider-text">Or sign up with</div>

  <div class="social-grid">
    <button class="social-btn" title="Sign up with Google">
      <svg viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
    </button>
    <button class="social-btn" title="Sign up with Apple">
      <svg viewBox="0 0 24 24">
        <path fill="#fff" d="M17.05 20.28c-.96.95-2.04 1.72-3.3 1.72-1.22 0-1.61-.75-3.1-.75-1.47 0-1.92.73-3.08.75-1.28.02-2.52-.89-3.51-2.04C2.04 17.65 1 14.96 1 12.19c0-4.32 2.72-6.58 5.39-6.58 1.41 0 2.6.93 3.47.93.84 0 2.22-.96 3.75-.96 1.11 0 2.5.51 3.4 1.5-3.04 1.78-2.54 6.27.44 7.64-.81 2.05-1.89 4.04-3.4 5.56zM13.29 4.24c-.21-2.45 1.96-4.49 4.09-4.24.26 2.5-2.13 4.67-4.09 4.24z"/>
      </svg>
    </button>
    <button class="social-btn" title="Sign up with Facebook">
      <svg viewBox="0 0 24 24">
        <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
      </svg>
    </button>
  </div>

  <p style="text-align:center; margin-top:24px; font-size:0.85rem; color:rgba(255,255,255,0.4);">
    Already have an account? <a href="login.html" style="color:var(--primary-light); font-weight:700;">Sign in</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script>
function gotoStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('step'+i).style.display = i===n ? 'block' : 'none';
    const dot = document.getElementById('s'+i);
    const item = document.getElementById('si'+i);
    if(i < n) { dot.className = 'step-dot done'; dot.textContent = '✓'; item.className = 'step-item'; }
    else if(i === n) { dot.className = 'step-dot active'; dot.textContent = i; item.className = 'step-item active'; }
    else { dot.className = 'step-dot'; dot.textContent = i; item.className = 'step-item'; }
  });
}
function pickTier(el) {
  document.querySelectorAll('.tier-opt').forEach(t => t.classList.remove('sel'));
  el.classList.add('sel');
}
function doSignup(btn) {
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Creating...';
  btn.disabled = true;
  setTimeout(() => window.location.href = 'dashboard/dashboard.html', 1500);
}
</script>
</body>
</html>
