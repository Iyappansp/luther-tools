<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Create Account — LuthierTools</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="stylesheet" href="assets/css/dark-mode.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #92400E 0%, #1F2937 100%);
      padding: 40px 20px;
      position: relative;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
    
    body::before {
      content: '';
      position: absolute;
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      filter: blur(40px);
    }
    
    .auth-card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 5;
      animation: cardFadeIn 0.8s cubic-bezier(.4, 0, .2, 1);
    }
    
    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .logo-badge {
      width: 48px;
      height: 48px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .auth-title {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: 4px;
    }

    .auth-subtitle {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 24px;
    }

    /* Steps Display */
    .steps-nav {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
      position: relative;
    }
    .steps-nav::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      z-index: 1;
    }
    .step-item {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 60px;
    }
    .step-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--secondary);
      border: 2px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.5);
      transition: all 0.3s ease;
    }
    .step-dot.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 0 15px rgba(146, 64, 14, 0.4);
    }
    .step-dot.done {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .step-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .step-item.active .step-label { color: var(--primary-light); }

    .auth-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }

    .auth-input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: all .3s ease;
      margin-bottom: 16px;
    }

    .auth-input:focus {
      border-color: var(--primary);
      background: rgba(146, 64, 14, 0.05);
    }

    .tier-opt {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 10px;
    }
    .tier-opt:hover { background: rgba(255, 255, 255, 0.08); }
    .tier-opt.sel {
      border-color: var(--primary);
      background: rgba(146, 64, 14, 0.1);
    }

    .submit-btn {
      width: 100%;
      height: 50px;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .submit-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }

    .theme-toggle-fixed { position: fixed; top: 24px; right: 24px; z-index: 100; }

    /* Light Mode */
    body.light { background: #f3f4f6; }
    body.light .auth-card { background: #fff; border-color: var(--border); box-shadow: 0 12px 32px rgba(0,0,0,0.06); }
    body.light .auth-title { color: var(--secondary); }
    body.light .auth-subtitle, body.light .auth-label { color: var(--text-muted); }
    body.light .auth-input { background: #fff; border-color: var(--border); color: var(--text); }
    body.light .tier-opt { background: var(--gray-100); border-color: var(--border); }
    body.light .tier-opt.sel { background: rgba(146, 64, 14, 0.05); }
    body.light .step-dot { background: var(--gray-200); color: var(--text-muted); }
  </style>
</head>
<body>

<button class="hdr-btn theme-toggle-fixed" data-theme-toggle>
  <span class="theme-ico">🌙</span>
</button>

<div class="auth-card">
  <div class="logo-container">
    <div class="logo-badge">🎸</div>
    <h1 class="auth-title">Create Trade Account</h1>
    <p class="auth-subtitle">Join our community of master builders</p>
  </div>

  <div class="steps-nav">
    <div class="step-item active" id="si1">
      <div class="step-dot active" id="s1">1</div>
      <span class="step-label">Account</span>
    </div>
    <div class="step-item" id="si2">
      <div class="step-dot" id="s2">2</div>
      <span class="step-label">Business</span>
    </div>
    <div class="step-item" id="si3">
      <div class="step-dot" id="s3">3</div>
      <span class="step-label">Plan</span>
    </div>
  </div>

  <!-- STEP 1 -->
  <div id="step1">
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:24px;">
      <button class="social-btn" style="margin-bottom:0; font-size:0.75rem; height:44px;" onclick="Toast.show('Google signup...')">
        <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path></svg>
        Google
      </button>
      <button class="social-btn" style="margin-bottom:0; font-size:0.75rem; height:44px;" onclick="Toast.show('Apple signup...')">
        <svg width="16" height="16" viewBox="0 0 384 512" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
        Apple
      </button>
      <button class="social-btn" style="margin-bottom:0; font-size:0.75rem; height:44px;" onclick="Toast.show('Facebook signup...')">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Facebook
      </button>
    </div>

    <div class="divider-text" style="display:flex; align-items:center; gap:10px; margin-bottom:20px; color:rgba(255,255,255,0.2); font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px;">
      <div style="flex:1; height:1px; background:rgba(255,255,255,0.1);"></div>
      or signup with email
      <div style="flex:1; height:1px; background:rgba(255,255,255,0.1);"></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div><label class="auth-label">First Name</label><input class="auth-input" type="text" placeholder="David"/></div>
      <div><label class="auth-label">Last Name</label><input class="auth-input" type="text" placeholder="Arroyo"/></div>
    </div>
    <label class="auth-label">Email Address</label>
    <input class="auth-input" type="email" placeholder="david@workshop.com"/>
    <label class="auth-label">Password</label>
    <input class="auth-input" type="password" placeholder="Min. 8 characters"/>
    
    <button class="submit-btn" onclick="gotoStep(2)">Continue →</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none;">
    <label class="auth-label">Business Name</label>
    <input class="auth-input" type="text" placeholder="Arroyo Guitar Shop"/>
    <label class="auth-label">Country</label>
    <select class="auth-input" style="appearance:none;">
      <option>United States</option>
      <option>United Kingdom</option>
      <option>Germany</option>
      <option>Australia</option>
    </select>
    <label class="auth-label">Workshop Type</label>
    <select class="auth-input">
      <option>Professional Luthier</option>
      <option>Repair Tech</option>
      <option>Hobbyist</option>
    </select>
    
    <div style="display:flex; gap:10px; margin-top:10px;">
      <button class="submit-btn" style="background:var(--secondary);" onclick="gotoStep(1)">← Back</button>
      <button class="submit-btn" onclick="gotoStep(3)">Continue →</button>
    </div>
  </div>

  <!-- STEP 3 -->
  <div id="step3" style="display:none;">
    <div class="tier-opt sel" onclick="pickTier(this)">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div><div style="font-weight:700; color:#fff;">Maker — Free</div><div style="font-size:0.75rem; color:rgba(255,255,255,0.5);">For hobbyists</div></div>
        <span>🔨</span>
      </div>
    </div>
    <div class="tier-opt" onclick="pickTier(this)">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div><div style="font-weight:700; color:#fff;">Trade Pro — $29/mo</div><div style="font-size:0.75rem; color:rgba(255,255,255,0.5);">Wholesale + Tutorials</div></div>
        <span>⭐</span>
      </div>
    </div>
    
    <div style="display:flex; align-items:center; gap:8px; margin:20px 0;">
      <input type="checkbox" id="tos" style="accent-color:var(--primary);"/>
      <label for="tos" style="font-size:0.8rem; color:rgba(255,255,255,0.5);">I agree to the Terms & Privacy</label>
    </div>

    <div style="display:flex; gap:10px;">
      <button class="submit-btn" style="background:var(--secondary);" onclick="gotoStep(2)">← Back</button>
      <button class="submit-btn" onclick="doSignup(this)">Complete 🎸</button>
    </div>
  </div>

  <p style="text-align:center; margin-top:24px; font-size:0.85rem; color:rgba(255,255,255,0.4);">
    Already have an account? <a href="login.html" style="color:var(--primary-light); font-weight:700;">Sign in</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script>
function gotoStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('step'+i).style.display = i===n ? 'block' : 'none';
    const dot = document.getElementById('s'+i);
    const item = document.getElementById('si'+i);
    if(i < n) { dot.className = 'step-dot done'; dot.textContent = '✓'; item.className = 'step-item'; }
    else if(i === n) { dot.className = 'step-dot active'; dot.textContent = i; item.className = 'step-item active'; }
    else { dot.className = 'step-dot'; dot.textContent = i; item.className = 'step-item'; }
  });
}
function pickTier(el) {
  document.querySelectorAll('.tier-opt').forEach(t => t.classList.remove('sel'));
  el.classList.add('sel');
}
function doSignup(btn) {
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Creating...';
  btn.disabled = true;
  setTimeout(() => window.location.href = 'dashboard/dashboard.html', 1500);
}
</script>
</body>
</html>
