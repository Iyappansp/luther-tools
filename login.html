<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — LuthierTools</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="stylesheet" href="assets/css/dark-mode.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1F2937 0%, #92400E 100%);
      padding: 40px 20px;
      position: relative;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
    
    body::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      filter: blur(40px);
    }
    
    body::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: rgba(146, 64, 14, 0.15);
      filter: blur(40px);
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 5;
      animation: cardFadeIn 0.8s cubic-bezier(.4, 0, .2, 1);
    }
    
    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .logo-badge {
      width: 54px;
      height: 54px;
      background: var(--primary);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 12px;
      box-shadow: 0 8px 16px rgba(146, 64, 14, 0.3);
    }

    .logo-text {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
    }

    .auth-title {
      font-family: var(--font-head);
      font-size: 1.75rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-input-group {
      margin-bottom: 20px;
    }

    .auth-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
    }

    .auth-input {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: all .3s ease;
    }

    .auth-input:focus {
      background: rgba(146, 64, 14, 0.05);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(146, 64, 14, 0.15);
    }

    .submit-btn {
      width: 100%;
      height: 54px;
      background: var(--primary);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all .3s ease;
      margin-bottom: 24px;
    }

    .submit-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(146, 64, 14, 0.4);
    }

    .divider-text {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider-text::before,
    .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .social-btn {
      width: 100%;
      height: 48px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s ease;
      margin-bottom: 12px;
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .auth-footer {
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .auth-footer a {
      color: var(--primary-light);
      font-weight: 700;
    }

    .theme-toggle-fixed {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
    }

    /* Light Mode */
    body.light { background: #f3f4f6; }
    body.light .auth-card {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(0, 0, 0, 0.05);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
    }
    body.light .logo-text,
    body.light .auth-title { color: var(--secondary); }
    body.light .auth-subtitle,
    body.light .auth-label { color: var(--text-muted); }
    body.light .auth-input,
    body.light .social-btn {
      background: #fff;
      border-color: var(--border);
      color: var(--text);
    }
    body.light .divider-text { color: var(--gray-300); }
    body.light .divider-text::before,
    body.light .divider-text::after { background: var(--border); }
  </style>
</head>
<body>

<button class="hdr-btn theme-toggle-fixed" data-theme-toggle title="Toggle theme">
  <span class="theme-ico">🌙</span>
</button>

<div class="auth-card">
  <div class="logo-container">
    <div class="logo-badge">🎸</div>
    <div class="logo-text">LuthierTools</div>
  </div>

  <h2 class="auth-title">Welcome Back</h2>
  <p class="auth-subtitle">Login to your account to continue</p>

  <form id="loginForm" onsubmit="event.preventDefault(); doLogin();">
    <div class="auth-input-group">
      <label class="auth-label">Email Address</label>
      <input class="auth-input" type="email" placeholder="you@workshop.com" required autocomplete="email"/>
    </div>

    <div class="auth-input-group">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <label class="auth-label" style="margin-bottom:0;">Password</label>
        <a href="#" style="font-size:0.75rem; color:var(--primary-light); font-weight:600;">Forgot?</a>
      </div>
      <div style="position:relative;">
        <input class="auth-input" type="password" id="pwd" placeholder="••••••••" required autocomplete="current-password"/>
        <button type="button" onclick="togglePwd()" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:rgba(255,255,255,0.4); cursor:pointer;">👁</button>
      </div>
    </div>

    <div style="display:flex; align-items:center; gap:8px; margin-bottom:28px;">
      <input type="checkbox" id="remember" style="accent-color:var(--primary);"/>
      <label for="remember" style="font-size:0.85rem; color:rgba(255,255,255,0.6); cursor:pointer;">Remember me</label>
    </div>

    <button type="submit" class="submit-btn" id="loginBtn">
      Sign In →
    </button>
  </form>

  <div class="divider-text">or continue with</div>

  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:32px;">
    <button class="social-btn" onclick="Toast.show('Google login...')">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path></svg>
      Google
    </button>
    <button class="social-btn" onclick="Toast.show('Apple login...')">
      <svg width="18" height="18" viewBox="0 0 384 512" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
      Apple
    </button>
    <button class="social-btn" onclick="Toast.show('Facebook login...')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook
    </button>
  </div>

  <p class="auth-footer">
    New here? <a href="signup.html">Create account</a>
  </p>
  
  <p style="text-align:center; margin-top:20px; font-size:0.75rem; color:rgba(255,255,255,0.3);">
    <a href="index.html" style="color:inherit;">← Back to Home</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script>
function togglePwd() {
  const f = document.getElementById('pwd');
  f.type = f.type === 'password' ? 'text' : 'password';
}

function doLogin() {
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';
  btn.disabled = true;
  setTimeout(() => window.location.href = 'dashboard/dashboard.html', 1500);
}
</script>
</body>
</html>
